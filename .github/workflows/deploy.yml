name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Projects/FinalGroupProject/**'
      - 'Assignments/Assignment3/**'
      - 'web-adventure-game/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build StockPulse ───────────────────────────────────────────────────
      - name: Install StockPulse dependencies
        working-directory: Projects/FinalGroupProject
        run: npm ci

      - name: Build StockPulse
        working-directory: Projects/FinalGroupProject
        run: npx vite build --base=/SchoolWork-WebProgramming-React/

      # ── Build Movie Browser ────────────────────────────────────────────────
      - name: Install Movie Browser dependencies
        working-directory: Assignments/Assignment3
        run: npm ci

      - name: Build Movie Browser
        working-directory: Assignments/Assignment3
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
        run: npx vite build --base=/SchoolWork-WebProgramming-React/movie-browser/

      # ── Merge into single dist ─────────────────────────────────────────────
      - name: Merge build outputs
        run: |
          mkdir -p _site
          cp -r Projects/FinalGroupProject/dist/. _site/
          mkdir -p _site/movie-browser
          cp -r Assignments/Assignment3/dist/. _site/movie-browser/
          mkdir -p _site/web-adventure-game
          cp -r web-adventure-game/. _site/web-adventure-game/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4